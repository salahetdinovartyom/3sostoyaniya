name: Build game

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      STORE_BASE64: ${{secrets.SINGING_STORE_BASE64 }}
      STORE_PASS: ${{secrets.SINGING_STORE_PASSWORD }}
      KEY_NAME: ${{secrets.SINGING_KEY_ATLAS }}
      KEY_PASS: ${{secrets.SINGING_KEY_PASSWORD }}
      STORE_NAME: "keystore.jks"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "$STORE_BASE64" > keystore.txt
          base64 -d keystore.txt > $STORE_NAME
          rm keystore.txt
          ls -la $STORE_NAME   # проверим, что файл создан

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/$STORE_NAME \
            -Pandroid.injected.signing.store.password=$STORE_PASS \
            -Pandroid.injected.signing.key.alias=$KEY_NAME \
            -Pandroid.injected.signing.key.password=$KEY_PASS

      - name: Build Release AAB
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/$STORE_NAME \
            -Pandroid.injected.signing.store.password=$STORE_PASS \
            -Pandroid.injected.signing.key.alias=$KEY_NAME \
            -Pandroid.injected.signing.key.password=$KEY_PASS

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/build/outputs/bundle/release/*.aab
